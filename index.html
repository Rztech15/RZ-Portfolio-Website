<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Muhammad Ramzan | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#05060f;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,200,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,120,255,0.20), transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(0,255,255,0.08), transparent 60%);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  position:sticky;
  top:0;
  background:rgba(5,6,15,0.75);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,200,255,0.2);
}

.logo{
  color:#00c8ff;
  font-weight:700;
}

nav a{
  margin-left:20px;
  color:#fff;
  text-decoration:none;
}
nav a:hover{
  color:#00c8ff;
}

/* HERO */
.hero{
  min-height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
}

/* MAIN LAYOUT FIX */
.hero-content{
  width:100%;
  max-width:1100px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:60px;
}

/* LEFT SIDE */
.hero-text{
  flex:1;
}

/* RIGHT SIDE */
.hero-image{
  flex:1;
  display:flex;
  justify-content:center;
}

/* BADGE */
.hero-badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(0,200,255,0.3);
  color:#00c8ff;
  margin-bottom:15px;
}

/* TITLE */
.hero-text h1{
  font-size:50px;
  margin:0;
}
.hero-text h1 span{
  color:#00c8ff;
}

/* SUBTEXT */
.hero-text p{
  color:#aaa;
  line-height:1.6;
}

/* BUTTONS */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:linear-gradient(45deg,#00c8ff,#0066ff);
  color:#fff;
  border-radius:10px;
  text-decoration:none;
}

/* PROFILE IMAGE */
.profile-pic-wrap{
  width:280px;
  height:280px;
  border-radius:50%;
  padding:4px;
  background:linear-gradient(45deg,#00c8ff,#7c3aed);
  box-shadow:0 0 40px rgba(0,200,255,0.4);
}

.profile-pic-wrap img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #05060f;
}

/* MOBILE */
@media(max-width:768px){
  .hero-content{
    flex-direction:column-reverse;
    text-align:center;
  }

  .hero-text h1{
    font-size:36px;
  }

  .profile-pic-wrap{
    width:220px;
    height:220px;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <div class="logo">Ramzan.</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero" id="home">
  <div class="hero-content">

    <!-- LEFT -->
    <div class="hero-text">
      <div class="hero-badge">👑 Data Analyst | Developer</div>

      <h1>Hi, I'm <span>Muhammad Ramzan</span></h1>

      <p>
        I build real-world projects using Python, Excel and Web Development.
        Focused on data analysis, machine learning and modern UI design.
      </p>

      <a href="#projects" class="btn">View Projects</a>
    </div>

    <!-- RIGHT -->
    <div class="hero-image">
      <div class="profile-pic-wrap">
        <img src="Profile pic.jpeg" alt="profile">
      </div>
    </div>

  </div>
</section>

</body>
</html>
